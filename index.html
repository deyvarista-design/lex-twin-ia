<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEX TWIN IA | Analizador de Expedientes</title>
  <style>
    :root {
      --primary: #1e3a8a;
      --secondary: #0284c7;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 750px;
      margin: 0 auto;
      background: var(--card);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    h1 { color: var(--primary); margin-bottom: 5px; text-align: center; }
    .subtitle { text-align: center; color: #64748b; font-size: 0.9em; margin-bottom: 25px; }
    label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
    input[type="password"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s;
    }
    button:hover { background: var(--secondary); }
    #loading { display: none; text-align: center; margin-top: 15px; color: var(--secondary); font-weight: bold; }
    #result {
      margin-top: 25px;
      padding: 20px;
      background: #f1f5f9;
      border-left: 4px solid var(--secondary);
      border-radius: 4px;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>⚖️ LEX TWIN IA</h1>
  <div class="subtitle">Predice. Corrige. Presenta. — Plataforma de Análisis Administrativo</div>

  <label for="apiKey">Clave API de Gemini (Gratuita):</label>
  <input type="password" id="apiKey" placeholder="Pega tu API Key de Google AI Studio aquí">

  <label for="expediente">Expediente o Solicitud a Analizar:</label>
  <textarea id="expediente" rows="8" placeholder="Ingresa el borrador del expediente o redacta la solicitud administrativa..."></textarea>

  <button onclick="analizarExpediente()">🔍 Analizar con Gemelo Digital</button>

  <div id="loading">⌛ Analizando expediente e identificando observaciones...</div>
  <div id="result"></div>
</div>

<script>
async function analizarExpediente() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const expediente = document.getElementById('expediente').value.trim();
  const loading = document.getElementById('loading');
  const resultDiv = document.getElementById('result');

  if (!apiKey) {
    alert("Por favor ingresa una API Key válida de Gemini.");
    return;
  }
  if (!expediente) {
    alert("Por favor ingresa el texto del expediente.");
    return;
  }

  loading.style.display = 'block';
  resultDiv.style.display = 'none';

  const prompt = `Actúa como el motor de Inteligencia Artificial de LEX TWIN IA, enfocado en Derecho Administrativo.
Analiza la siguiente solicitud/expediente:

"${expediente}"

Estructura tu respuesta claramente con los siguientes puntos:
1. 📊 PROBABILIDAD DE ÉXITO ESTIMA EN PORCENTAJE (%)
2. ⚠️ OBSERVACIONES / ERRORES DETECTADOS (Falta de datos, inconsistencias, requisitos faltantes)
3. 💡 RECOMENDACIONES DE MEJORA para optimizar la documentación antes de su presentación.`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }]
      })
    });

    const data = await response.json();
    loading.style.display = 'none';

    if (data.candidates && data.candidates[0].content.parts[0].text) {
      resultDiv.innerText = data.candidates[0].content.parts[0].text;
      resultDiv.style.display = 'block';
    } else {
      resultDiv.innerText = "Error al procesar el análisis. Verifica tu API Key.";
      resultDiv.style.display = 'block';
    }
  } catch (error) {
    loading.style.display = 'none';
    alert("Ocurrió un error al conectar con la IA: " + error.message);
  }
}
</script>

</body>
</html>
